name: CI

# Runs only when a release tag is pushed; regular commits/PRs do not trigger it.
on:
  push:
    tags:
      - v*.*.*

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.friendlyName }}
    # Needs write access to upload prebuilt binaries to GitHub releases on tags.
    permissions:
      contents: write
    env:
      CC: "clang"
      CXX: "clang++"
      npm_config_clang: "1"

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]
        os: [ubuntu-22.04, windows-2022, macos-latest]
        include:
          - os: ubuntu-22.04
            friendlyName: Ubuntu
          - os: windows-2022
            friendlyName: Windows
          - os: macos-latest
            friendlyName: macOS

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - run: |
        sudo apt-get update
        sudo apt-get install -y gnome-keyring \
                             libsecret-1-dev \
                             dbus-x11 \
                             python3-dev
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      name: Install additional dependencies

    - run: npm install
      name: Setup environment

    - run: npm run build
      name: Build native module from source

    - run: |
        echo "Install keyring..."
        pip3 install --upgrade pip
        pip3 install keyring
        echo "Prepare D-Bus session..."
        eval $(dbus-launch --sh-syntax);
        eval $(echo 'somecredstorepass' | gnome-keyring-daemon --unlock)
        echo "Create a test key using script..."
        python3 -c "import keyring;keyring.set_password('system', 'login', 'pwd');"
        npm test
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      name: Run tests (Linux)

    - run: npm test
      if: ${{ matrix.os != 'ubuntu-22.04' }}
      name: Run tests (Windows/macOS)

    - run: npm run prebuild-napi-x64
      name: Prebuild (x64)

    - run: npm run prebuild-napi-arm64
      name: Prebuild (arm64)
      if: ${{ matrix.os != 'ubuntu-22.04' }}

    - run: npm run prebuild-napi-ia32
      if: ${{ matrix.os == 'windows-2022' }}
      name: Prebuild (Windows x86)

    - run: |
        mkdir -p prebuilds && chmod 777 prebuilds
        docker build -t node-keytar/i386 docker/i386
        docker run --rm -v ${PWD}:/project node-keytar/i386 /bin/bash -c "cd /project && npm run prebuild-napi-ia32 && rm -rf build"
        docker build -t node-keytar/arm64-cross-compile docker/arm64-cross-compile
        docker run --rm -v ${PWD}:/project node-keytar/arm64-cross-compile /bin/bash -c "cd /project && npm run prebuild-napi-arm64 && rm -rf build"
        docker build -t node-keytar/armv7l-cross-compile docker/armv7l-cross-compile
        docker run --rm -v ${PWD}:/project node-keytar/armv7l-cross-compile /bin/bash -c "cd /project && npm run prebuild-napi-armv7l"
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      continue-on-error: true
      name: Prebuild (Linux x86 + ARM64 + ARMV7L)

    - run: |
        ls prebuilds/
      name: List prebuilds

    - name: Upload prebuilds to GitHub
      run: npm run upload
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      env:
        GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alpine-build:
    runs-on: ubuntu-latest
    container: node:22-alpine
    # Needs write access to upload prebuilt binaries to GitHub releases on tags.
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: install additional dependencies
      run: |
        apk add g++ make python3 libsecret-dev

    - run: npm install
      name: Setup environment

    - run: |
        npm run prebuild-napi-x64
        npm run prebuild-napi-arm64
      name: Prebuild

    - run: |
        ls prebuilds/
      name: List prebuilds

    - name: Upload prebuilds to GitHub
      run: npm run upload
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      env:
        GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Separate step for publishing to NPM so we're sure that generating + uploading prebuilds worked on all platforms
  npm-publish:
    needs: [build, alpine-build]
    name: Publish to NPM
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    # id-token: write is required for npm trusted publishing (OIDC) and provenance.
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        registry-url: 'https://registry.npmjs.org'

    # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
    - run: npm install -g npm@latest
      name: Upgrade npm for trusted publishing

    - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      name: Install additional dependencies

    - run: npm install
      name: Setup environment

    # No NODE_AUTH_TOKEN: authentication is via OIDC trusted publishing.
    # --provenance is implied by trusted publishing but set explicitly for clarity.
    - run: npm publish --access public --provenance
      name: Upload to NPM
